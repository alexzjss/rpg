<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vínculos Além do Tempo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg-base:    #0f1117;
            --bg-surface: #161b26;
            --bg-raised:  #1c2234;
            --bg-overlay: #222840;
            --gold-dim:   #7a5e1a;
            --gold-mid:   #c9983a;
            --gold-bright:#f0c060;
            --gold-pale:  #fdf0cc;
            --text-primary:  #eef2ff;
            --text-secondary:#9aabcc;
            --text-muted:    #4e5f7a;
            --text-faint:    #2e3849;
            --border-faint: rgba(255,255,255,0.07);
            --border-mid:   rgba(255,255,255,0.12);
            --border-gold:  rgba(201,152,58,0.30);
            /* ── Metaphor UI tokens ──── */
            --team-cast:   #c9983a;
            --team-npc:    #dc2626;
            --hp-high:     #22c55e;
            --hp-mid:      #eab308;
            --hp-low:      #ef4444;
            --ap-color:    #818cf8;
            --state-down:  #334155;
            --state-alert: #f97316;
            /* ── Fundação visual global (Etapa A) ──── */
            --accent-crimson: #dc2626;
            --accent-pink:    #ec4899;
            --accent-cyan:    #67e8f9;
            --paper-white:    #eef0f5;
            --ink:            #0a0c12;
            --panel-glass:    rgba(6,8,16,0.78);
            --brush-dark:     rgba(4,6,14,0.86);
            --brush-light:    rgba(238,240,245,0.92);
            --danger:         #ef4444;
            --success:        #22c55e;
            --warning:        #f59e0b;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, .font-cinzel { font-family: 'Cinzel', serif; }

        /* ── Fase 0: tipografia cerimonial ── */
        .mp-title, .mp-page-title {
          font-family: 'Playfair Display', Georgia, serif;
          font-style: italic; font-weight: 900;
          letter-spacing: -0.01em; line-height: 0.92;
          color: var(--text-primary);
        }
        .mp-kicker {
          font-family: 'Cinzel', serif; font-weight: 700;
          text-transform: uppercase; letter-spacing: 0.32em;
          font-size: 9px; color: var(--gold-mid);
        }
        /* base que reage ao clima ativo */
        html { background-color: var(--bg-base); }
        :root[data-atmosphere='parchment'] body { color: var(--text-primary); }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-mid); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* ─── Animations ────────────────────────────── */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .anim-fade-up    { animation: fadeSlideUp 0.45s cubic-bezier(0.22,1,0.36,1) both; }
        .anim-fade-up-d1 { animation: fadeSlideUp 0.45s 0.06s cubic-bezier(0.22,1,0.36,1) both; }
        .anim-fade-up-d2 { animation: fadeSlideUp 0.45s 0.12s cubic-bezier(0.22,1,0.36,1) both; }
        .anim-fade-up-d3 { animation: fadeSlideUp 0.45s 0.18s cubic-bezier(0.22,1,0.36,1) both; }
        /* Global button transitions */
        button { transition: opacity 0.18s ease, transform 0.18s cubic-bezier(0.34,1.56,0.64,1), background 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease; }
        button:active:not(:disabled) { transform: scale(0.95) !important; }

        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .anim-fade { animation: fadeIn 0.25s ease both; }

        @keyframes scaleIn {
            from { opacity:0; transform:scale(0.92); }
            to   { opacity:1; transform:scale(1); }
        }
        .anim-scale-in { animation: scaleIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both; }

        /* Combat Impact */
        @keyframes impact-flash {
            0%   { filter: brightness(1)   contrast(1)   saturate(1);   transform: scale(1)    rotate(0deg); }
            8%   { filter: brightness(4.5) contrast(2.5) saturate(2.5); transform: scale(1.18) rotate(1.5deg); }
            20%  { filter: brightness(2)   contrast(1.5) saturate(1.5); transform: scale(1.08) rotate(-0.5deg); }
            100% { filter: brightness(1)   contrast(1)   saturate(1);   transform: scale(1)    rotate(0deg); }
        }
        .animate-impact { animation: impact-flash 0.55s cubic-bezier(0.1,0.9,0.2,1) both; }

        @keyframes turn-pulse {
            0%   { box-shadow: 0 0 0 0   rgba(201,152,58,0.8), 0 0 30px rgba(201,152,58,0.2); border-color: var(--gold-mid); }
            60%  { box-shadow: 0 0 0 10px rgba(201,152,58,0),   0 0 50px rgba(201,152,58,0.4); border-color: var(--gold-bright); }
            100% { box-shadow: 0 0 0 0   rgba(201,152,58,0),   0 0 30px rgba(201,152,58,0.2); border-color: var(--gold-mid); }
        }
        .animate-turn { animation: turn-pulse 2.2s ease-in-out infinite; }

        @keyframes success-pulse {
            0%,100% { transform:scale(1.25); filter: brightness(1)   drop-shadow(0 0 20px rgba(52,211,153,0.8)); }
            50%      { transform:scale(1.35); filter: brightness(1.5) drop-shadow(0 0 40px rgba(52,211,153,1)); }
        }
        .animate-success-pulse { animation: success-pulse 1.2s ease-in-out infinite; }

        @keyframes shimmer {
            0%   { background-position: -400px 0; }
            100% { background-position:  400px 0; }
        }
        .shimmer {
            background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-raised) 50%, var(--bg-surface) 75%);
            background-size: 800px 100%;
            animation: shimmer 1.6s infinite linear;
        }

        @keyframes float-up {
            0%,100% { transform:translateY(0px); }
            50%      { transform:translateY(-4px); }
        }
        .animate-float { animation: float-up 2.8s ease-in-out infinite; }

        @keyframes danger-pulse {
            0%,100% { opacity:1; }
            50%      { opacity:0.55; }
        }
        .animate-danger { animation: danger-pulse 1.1s ease-in-out infinite; }

        @keyframes spin-slow { to { transform:rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 2.5s linear infinite; }

        @keyframes barFill { from { width: 0% !important; } }
        .animate-bar-fill { animation: barFill 0.9s cubic-bezier(0.22,1,0.36,1) both; }

        /* ── Stat popups — JRPG floating numbers ────────────────── */
        @keyframes statPopup {
            0%   { opacity:0; transform:translateX(-50%) translateY(0) scale(1.6); filter:blur(2px); }
            12%  { opacity:1; transform:translateX(-50%) translateY(-4px) scale(1.0); filter:blur(0); }
            70%  { opacity:1; transform:translateX(-50%) translateY(-28px) scale(1.0); }
            100% { opacity:0; transform:translateX(-50%) translateY(-58px) scale(0.85); }
        }
        @keyframes statPopup-dmg {
            0%   { opacity:0; transform:translateX(-50%) translateY(0) scale(2.2) rotate(-4deg); filter:blur(3px); }
            10%  { opacity:1; transform:translateX(-50%) translateY(-6px) scale(1.1) rotate(1deg); filter:blur(0); }
            22%  { transform:translateX(-50%) translateY(-10px) scale(1.0) rotate(0); }
            72%  { opacity:1; transform:translateX(-50%) translateY(-42px) scale(1.0); }
            100% { opacity:0; transform:translateX(-50%) translateY(-72px) scale(0.8); }
        }
        @keyframes statPopup-heal {
            0%   { opacity:0; transform:translateX(-50%) translateY(6px) scale(0.7); }
            18%  { opacity:1; transform:translateX(-50%) translateY(-2px) scale(1.12); }
            30%  { transform:translateX(-50%) translateY(-8px) scale(1.0); }
            72%  { opacity:1; transform:translateX(-50%) translateY(-38px) scale(1.0); }
            100% { opacity:0; transform:translateX(-50%) translateY(-60px) scale(0.9); }
        }

        /* ── Impact shockwave ring ────────────────────────────── */
        @keyframes impact-shockwave {
            0%   { transform:translate(-50%,-50%) scale(0.4); opacity:0.9; border-width:4px; }
            60%  { opacity:0.5; }
            100% { transform:translate(-50%,-50%) scale(2.8); opacity:0; border-width:1px; }
        }
        .impact-shockwave {
            position:absolute; left:50%; top:50%;
            width:100%; height:100%;
            border-radius:50%;
            border:3px solid rgba(239,68,68,0.9);
            box-shadow:0 0 12px rgba(239,68,68,0.6);
            pointer-events:none;
            animation:impact-shockwave 0.55s cubic-bezier(0.1,0.8,0.2,1) both;
            z-index:50;
        }

        /* ── Skill row click flash ────────────────────────────── */
        @keyframes skill-row-activate {
            0%   { background:rgba(236,72,153,0.36); box-shadow:inset 0 0 0 2px rgba(236,72,153,0.7); }
            100% { background:transparent; box-shadow:none; }
        }
        .mp-skill-row:active {
            animation: skill-row-activate 0.28s ease both !important;
        }

        /* ── Turn banner — entrada com skew dramático ─────────── */
        @keyframes turnBannerSlide {
            0%   { opacity:0; transform:translateX(-80px) skewX(-4deg); }
            14%  { opacity:1; transform:translateX(6px) skewX(1deg); }
            22%  { transform:translateX(-2px) skewX(-0.5deg); }
            30%  { transform:translateX(0) skewX(0); }
            72%  { opacity:1; transform:translateX(0) skewX(0); }
            88%  { opacity:1; transform:translateX(4px); }
            100% { opacity:0; transform:translateX(60px) skewX(3deg); }
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Glass panels ──────────────────────────── */
        .glass-panel {
            background: rgba(22,27,38,0.80);
            backdrop-filter: blur(20px) saturate(1.5);
            border: 1px solid var(--border-gold);
        }
        .glass-panel-light {
            background: rgba(28,34,52,0.65);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-faint);
        }

        /* Glow shadows */
        .success-glow  { box-shadow: 0 0 80px rgba(52,211,153,0.35),  inset 0 0 30px rgba(52,211,153,0.12); }
        .failure-glow  { box-shadow: 0 0 80px rgba(244,63,94,0.35),   inset 0 0 30px rgba(244,63,94,0.12); }
        .reaction-glow { box-shadow: 0 0 80px rgba(139,92,246,0.35),  inset 0 0 30px rgba(139,92,246,0.12); }

        /* Gradient text */
        .text-gradient-gold {
            background: linear-gradient(135deg, var(--gold-bright), var(--gold-mid));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-fire {
            background: linear-gradient(135deg, #fbbf24, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Range input */
        input[type=range] {
            -webkit-appearance: none;
            height: 6px;
            border-radius: 99px;
            background: var(--bg-raised);
            outline: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--gold-mid);
            border: 2px solid var(--bg-base);
            box-shadow: 0 0 0 3px rgba(201,152,58,0.3);
            transition: box-shadow 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 0 5px rgba(201,152,58,0.4);
        }

        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 0 3px rgba(201,152,58,0.18);
        }

        button { transition: all 0.18s cubic-bezier(0.22,1,0.36,1); }
        button:active:not(:disabled) { transform: scale(0.96); }

        /* Combat grid cell hover */
        .grid-cell { transition: background 0.15s, border-color 0.15s; }
        .grid-cell:hover {
            background: rgba(201,152,58,0.08) !important;
            border-color: rgba(201,152,58,0.3) !important;
        }

        /* Noise texture overlay */
        .noise-overlay::after {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            border-radius: inherit;
        }

        /* Navbar */
        .nav-glow {
            box-shadow: 0 1px 0 rgba(201,152,58,0.15), 0 4px 40px rgba(0,0,0,0.7);
        }

        /* Card type hover glows */
        .card-ataque, .card-reacao, .card-acao, .card-reforco, .card-vinculo, .card-forma, .card-combinacao, .card-seal {
            transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.32s ease, filter 0.28s ease;
            will-change: transform, box-shadow;
        }
        .card-ataque:hover  { transform: translateY(-8px) scale(1.022); box-shadow: 0 20px 56px rgba(220,38,38,0.38), 0 0 0 1.5px rgba(220,38,38,0.35), 0 0 80px rgba(220,38,38,0.1); }
        .card-reacao:hover  { transform: translateY(-8px) scale(1.022); box-shadow: 0 20px 56px rgba(59,130,246,0.38), 0 0 0 1.5px rgba(59,130,246,0.35), 0 0 80px rgba(59,130,246,0.1); }
        .card-acao:hover    { transform: translateY(-8px) scale(1.022); box-shadow: 0 20px 56px rgba(234,179,8,0.38), 0 0 0 1.5px rgba(234,179,8,0.35), 0 0 80px rgba(234,179,8,0.1); }
        .card-reforco:hover { transform: translateY(-8px) scale(1.022); box-shadow: 0 20px 56px rgba(34,197,94,0.38), 0 0 0 1.5px rgba(34,197,94,0.35), 0 0 80px rgba(34,197,94,0.1); }
        .card-vinculo:hover { transform: translateY(-8px) scale(1.022); box-shadow: 0 20px 56px rgba(148,163,184,0.38), 0 0 0 1.5px rgba(148,163,184,0.35), 0 0 80px rgba(148,163,184,0.1); }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* ─── Sidebar panels ────────────────────────── */
        .sidebar-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border-faint);
            border-radius: 12px;
            padding: 12px 14px;
        }
        .sidebar-section-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ─── Combat quick-action buttons ──────────── */
        .combat-quick-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            border: 1px solid var(--border-mid);
            background: var(--bg-raised);
            color: var(--text-secondary);
            width: 100%;
            transition: all 0.2s;
        }
        .combat-quick-btn:hover {
            background: var(--bg-overlay);
            color: var(--text-primary);
            border-color: var(--border-gold);
        }

        /* Stat pill */
        .stat-pill {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        /* HP bar heights — taller in combat */
        .hp-bar { height: 5px; border-radius: 99px; overflow: hidden; background: rgba(0,0,0,0.5); }
        .hp-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

        /* Initiative card */
        .init-card {
            border-radius: 12px;
            padding: 8px 10px 9px;
            border: 1px solid var(--border-faint);
            background: var(--bg-surface);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
            flex-shrink: 0;
        }
        .init-card:hover {
            border-color: var(--border-gold);
            background: var(--bg-raised);
        }
        .init-card.active {
            background: linear-gradient(145deg, rgba(120,90,20,0.45) 0%, rgba(70,50,10,0.6) 100%);
            border-color: rgba(212,168,83,0.7);
            box-shadow: 0 0 22px rgba(201,152,58,0.25), inset 0 1px 0 rgba(255,255,255,0.07);
        }
        .init-card.selected {
            background: rgba(28,34,52,0.9);
            border-color: rgba(212,168,83,0.35);
        }
        .init-card.defeated {
            filter: grayscale(0.9) opacity(0.45);
        }

        /* Turn counter badge */
        .turn-counter {
            background: linear-gradient(135deg, rgba(201,152,58,0.2), rgba(120,90,20,0.3));
            border: 1px solid rgba(212,168,83,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }

        /* Combat note textarea */
        .combat-notes {
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border-faint);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
            color: var(--text-secondary);
            resize: none;
            outline: none;
            width: 100%;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
        }
        .combat-notes:focus { border-color: var(--border-gold); }

        /* Damage quick input */
        .dmg-input {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-faint);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-primary);
            outline: none;
            width: 70px;
            text-align: center;
        }
        .dmg-input:focus { border-color: rgba(248,113,113,0.6); }

        /* Turn timer */
        @keyframes timerTick {
            from { background-color: rgba(201,152,58,0.1); }
            to   { background-color: rgba(239,68,68,0.25); }
        }
        .timer-urgent { animation: timerTick 1s ease-in-out infinite alternate; }

        /* Custom scrollbar for panels */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 99px; }

        /* ─── GLOBAL FIX: força inputs e textareas a nunca usar fundo branco ─── */
        input:not([type=range]):not([type=file]):not([type=checkbox]):not([type=radio]),
        textarea,
        select {
            background-color: rgba(0,0,0,0.45) !important;
            color: var(--text-primary) !important;
        }
        input::placeholder, textarea::placeholder { color: var(--text-faint) !important; }
        input:not([type=range]):not([type=file]):not([type=checkbox]):not([type=radio]):focus,
        textarea:focus,
        select:focus {
            background-color: rgba(0,0,0,0.55) !important;
        }
        /* cor de preenchimento automático (autofill) do browser */
        input:-webkit-autofill,
        textarea:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 100px #0f1117 inset !important;
            -webkit-text-fill-color: var(--text-primary) !important;
        }

        /* ─── Forma card type styles ─── */
        .card-forma:hover { transform: translateY(-8px) scale(1.022); box-shadow: 0 20px 56px rgba(245,158,11,0.45), 0 0 0 1.5px rgba(245,158,11,0.4), 0 0 80px rgba(245,158,11,0.12); }
        .card-combinacao:hover { transform: translateY(-8px) scale(1.022); box-shadow: 0 20px 56px rgba(192,132,252,0.45), 0 0 0 1.5px rgba(192,132,252,0.4), 0 0 80px rgba(192,132,252,0.12); }
        .card-seal:hover { transform: translateY(-8px) scale(1.022); box-shadow: 0 20px 56px rgba(234,88,12,0.5), 0 0 0 1.5px rgba(234,88,12,0.45), 0 0 80px rgba(234,88,12,0.15); }
        @keyframes seal-orb-pulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }

        /* Forma activation flash overlay */
        @keyframes forma-flash {
            0%   { opacity: 0; transform: scale(0.9); }
            15%  { opacity: 1; transform: scale(1.05); }
            60%  { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }
        @keyframes forma-card-zoom {
            0%   { opacity: 0; transform: translate(-50%, -60%) scale(0.3) rotate(-8deg); }
            30%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(2deg); }
            65%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8) rotate(0deg); }
        }
        @keyframes forma-glow-pulse {
            0%,100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
        }
        .forma-flash { animation: forma-flash 1.8s cubic-bezier(0.22,1,0.36,1) forwards; }
        .forma-card-zoom { animation: forma-card-zoom 1.8s cubic-bezier(0.22,1,0.36,1) forwards; }
        .forma-glow-anim { animation: forma-glow-pulse 2s ease-in-out infinite; }

        /* ─── Elemental glow animations (CSS-only, reliable) ─── */
        @keyframes el-glow-fogo {
            0%,100% { box-shadow: 0 0 20px 6px rgba(239,68,68,0.7), 0 0 60px 10px rgba(249,115,22,0.35); }

        /* mp-panel: painel com corte diagonal, borda dourada, alto contraste */
        .mp-panel {
            background: var(--bg-surface);

            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
            position: relative;
        }
        .mp-panel::before {
            content: '';
            position: absolute; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        .mp-heading {
            font-style: italic;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        /* mp-skew-row: linha inclinada com conteúdo des-inclinado */
        .mp-skew-row {
            transform: skewX(-6deg);

        .mp-skew-row > * {
            transform: skewX(6deg);

        /* mp-active-glow: realce por time (--team-color setado inline no elemento) */
        .mp-active-glow {
            box-shadow: 0 0 0 2px var(--team-color, var(--border-gold)),
                        0 0 16px -2px var(--team-color, var(--border-gold));
            border-color: var(--team-color, var(--border-gold)) !important;
        }

        /* mp-list-item: item de lista contextual vertical */
        .mp-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
            position: relative;
        }
        .mp-list-item:hover:not(.mp-list-item--unavailable) {
            background: rgba(201,152,58,0.08);
            transform: translateX(2px);
        }
        .mp-list-item--selected {
            background: rgba(201,152,58,0.15);
            border-color: var(--gold-mid);
            border-left-width: 3px;
        }
        .mp-list-item--unavailable {
            opacity: 0.38;
            cursor: not-allowed;
        }
        .mp-list-item--unavailable:hover {
            background: transparent;
            transform: none;
        }

        /* mp-state-down: combatente inconsciente/derrotado */
        .mp-state-down {
            filter: grayscale(1);
            opacity: 0.5;
        }

        /* mp-forma-ring-pulse: anel animado de forma ativável (TurnOrderRow) */
        @keyframes mp-forma-ring-pulse {
            0%,100% {
                box-shadow: 0 0 0 2px var(--forma-ring-color, var(--gold-mid));
                opacity: 0.75;
            }
            50% {
                box-shadow: 0 0 0 3px var(--forma-ring-color, var(--gold-bright)),
                            0 0 10px 2px var(--forma-ring-color, var(--gold-mid));
                opacity: 1;
            }
        }
        .mp-forma-ring-pulse {
            animation: mp-forma-ring-pulse 2s ease-in-out infinite;
        }

        /* ════════════════════════════════════════════════════════════════
           FUNDAÇÃO VISUAL GLOBAL — design system "mp" (Etapa A)
           Aditivo e reutilizável em TODAS as abas. Ainda não consumido.
           Direção: diagonais, recortes, alto contraste, pinceladas,
           tipografia grande, superfícies claras "pintadas" para detalhe.
           ════════════════════════════════════════════════════════════════ */

        /* ─── Tipografia de página / seção ─────────────────────────────── */
        /* mp-page-title: palavra-título gigante, italic/black, para headers
           teatrais. O recorte/sangramento vem do container que a usa. */
        .mp-page-title {
            margin: 0;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.03em;
            line-height: 0.82;
            font-size: clamp(38px, 5.4vw, 78px);
            color: #fff;
            text-shadow: 0 3px 0 rgba(0,0,0,0.32), 0 0 40px rgba(0,0,0,0.45);
        }
        /* mp-section-kicker: rótulo pequeno acima de títulos (ciano frio) */
        .mp-section-kicker {
            display: inline-block;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.42em;
            line-height: 1;
            color: var(--accent-cyan);
            text-shadow: 0 0 14px color-mix(in srgb, var(--accent-cyan) 40%, transparent);
        }

        /* ─── Pincelada de realce reutilizável ─────────────────────────── */
        /* mp-brush-accent: faixa "pintada" — usar como <span> de fundo atrás
           de itens selecionados/realçados. Preenche o pai. */
        .mp-brush-accent {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(100deg, var(--accent-pink), var(--accent-crimson) 56%, var(--accent-cyan));
            clip-path: polygon(0 22%, 92% 0, 100% 64%, 6% 100%);
            opacity: 0.92;
        }

        /* ─── Superfícies / painéis ───────────────────────────────────── */
        /* mp-card: card escuro com corte diagonal — substitui rounded-xl */
        .mp-card {
            position: relative;
            isolation: isolate;
            background: var(--panel-glass);
            border: 1px solid var(--border-mid);
            padding: 16px 18px;
            overflow: hidden;
            backdrop-filter: blur(10px) saturate(1.15);
            clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }
        .mp-card::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                linear-gradient(125deg, rgba(255,255,255,0.06), transparent 30%),
                radial-gradient(ellipse at 12% 0%, rgba(201,152,58,0.10), transparent 56%);
            opacity: 0.85;
        }
        .mp-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-gold);
            box-shadow: 0 18px 44px rgba(0,0,0,0.5), 0 0 24px rgba(201,152,58,0.10);
        }

        /* mp-info-card: superfície CLARA "pintada" — assinatura do app.
           Para detalhe importante (descrição selecionada). --accent define
           a cor da barra lateral e dos rótulos. */
        .mp-info-card {
            --accent: var(--gold-mid);
            position: relative;
            z-index: 1;
            padding: 14px 16px 15px;
            color: rgba(8,10,16,0.80);
            background: linear-gradient(100deg, var(--paper-white), #dde1ea);
            border-left: 6px solid var(--accent);
            box-shadow: 0 16px 40px rgba(0,0,0,0.4);
            clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
        }
        .mp-info-card__title {
            margin: 0 0 5px;
            color: var(--ink);
            font-size: 15px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.01em;
        }
        .mp-info-card__meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            color: color-mix(in srgb, var(--accent) 64%, #111827 36%);
        }
        .mp-info-card p {
            margin: 0;
            font-size: 11.5px;
            line-height: 1.45;
            color: rgba(8,10,16,0.74);
        }

        /* ─── Navegação (abas inclinadas) ─────────────────────────────── */
        .mp-tab {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 13px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(3,5,12,0.5);
            color: var(--text-secondary);
            font-weight: 800;
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
            cursor: pointer;
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
            transition: color 0.16s ease, background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
        }
        .mp-tab:hover {
            color: var(--text-primary);
            border-color: var(--border-gold);
            background: rgba(255,255,255,0.06);
        }
        .mp-tab--active {
            background: linear-gradient(105deg, var(--gold-bright), var(--gold-mid) 54%, var(--accent-pink));
            color: #0f1117;
            border-color: rgba(240,192,96,0.6);
            box-shadow: 0 0 18px rgba(201,152,58,0.3), inset 0 1px 0 rgba(255,255,255,0.28);
        }

        /* ─── Rail (toolbar/segmented genérica) ───────────────────────── */
        .mp-rail {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 8px;
            background:
                linear-gradient(100deg, rgba(201,152,58,0.14), rgba(0,0,0,0.5) 45%, rgba(0,0,0,0.2)),
                linear-gradient(0deg, rgba(255,255,255,0.05), transparent);
            border: 1px solid var(--border-mid);
            clip-path: polygon(12px 0, 100% 0, calc(100% - 11px) 100%, 0 100%);
        }
        .mp-rail-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 13px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(3,5,12,0.5);
            color: var(--text-secondary);
            font-weight: 800;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
            transition: color 0.16s ease, background 0.16s ease, border-color 0.16s ease;
        }
        .mp-rail-button:hover {
            color: var(--text-primary);
            border-color: var(--border-gold);
            background: rgba(255,255,255,0.06);
        }
        .mp-rail-button--active {
            background: linear-gradient(105deg, rgba(201,152,58,0.4), rgba(236,72,153,0.2));
            color: var(--gold-pale);
            border-color: rgba(240,192,96,0.5);
            box-shadow: 0 0 14px rgba(201,152,58,0.2);
        }

        /* ─── Botões de ação (CTA) ────────────────────────────────────── */
        .mp-cta {
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 22px;
            border: 1px solid rgba(240,192,96,0.7);
            background: linear-gradient(105deg, var(--gold-bright), var(--gold-mid) 52%, var(--accent-pink));
            color: #080a10;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
            clip-path: polygon(12px 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
            box-shadow: 0 10px 26px rgba(0,0,0,0.36), 0 0 22px rgba(201,152,58,0.26);
            transition: transform 0.16s ease, filter 0.16s ease, box-shadow 0.16s ease;
        }
        .mp-cta:hover { transform: translateY(-1px); filter: brightness(1.08); }
        .mp-cta--secondary {
            background: rgba(3,5,12,0.55);
            border-color: rgba(255,255,255,0.14);
            color: rgba(238,242,255,0.78);
            box-shadow: none;
        }
        .mp-cta--secondary:hover { color: var(--gold-pale); border-color: var(--border-gold); }
        .mp-cta--danger {
            background: linear-gradient(105deg, rgba(127,29,29,0.6), rgba(3,5,12,0.6));
            border-color: rgba(248,113,113,0.45);
            color: #fca5a5;
            box-shadow: none;
        }
        .mp-cta--danger:hover { border-color: rgba(248,113,113,0.7); background: rgba(127,29,29,0.62); }

        /* ─── Campos de formulário ────────────────────────────────────── */
        .mp-input {
            width: 100%;
            padding: 9px 12px;
            background: rgba(0,0,0,0.42) !important;
            border: 1px solid var(--border-mid);
            border-bottom: 2px solid var(--gold-dim);
            color: var(--text-primary) !important;
            font-size: 13px;
            outline: none;
            clip-path: polygon(8px 0, 100% 0, 100% 100%, 0 100%, 0 8px);
            transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }
        .mp-input:focus {
            border-bottom-color: var(--gold-bright);
            box-shadow: 0 6px 20px -8px rgba(201,152,58,0.45) !important;
        }

        /* ─── Empty state ─────────────────────────────────────────────── */
        .mp-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 48px 28px;
            text-align: center;
            color: var(--text-muted);
            border: 1px dashed var(--border-gold);
            background: rgba(8,10,16,0.4);
            clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
        }
        .mp-empty strong {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .mp-empty span { max-width: 280px; font-size: 11px; line-height: 1.5; }

        /* ─── Modal (shell diagonal) ──────────────────────────────────── */
        .mp-modal {
            position: relative;
            isolation: isolate;
            background: var(--bg-surface);
            border: 1px solid var(--border-gold);
            box-shadow: 0 30px 100px rgba(0,0,0,0.8);
            overflow: hidden;
            clip-path: polygon(0 0, calc(100% - 26px) 0, 100% 26px, 100% 100%, 26px 100%, 0 calc(100% - 26px));
        }
        .mp-modal::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                linear-gradient(125deg, rgba(255,255,255,0.06), transparent 28%),
                radial-gradient(ellipse at 70% 0%, rgba(201,152,58,0.08), transparent 60%);
        }

        /* ─── Banner de personagem/item (faixa com retrato) ───────────── */
        /* mp-banner: generaliza o mp-turn-banner para listas fora do combate.
           --banner-accent define a cor de realce por categoria/papel. */
        .mp-banner {
            --banner-accent: var(--gold-mid);
            position: relative;
            isolation: isolate;
            min-height: 76px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px 12px 14px;
            overflow: hidden;
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.10);
            background: var(--brush-dark);
            box-shadow: 0 8px 22px rgba(0,0,0,0.38);
            clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 16px, calc(100% - 8px) 100%, 12px 100%, 0 calc(100% - 12px));
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }
        .mp-banner:hover {
            transform: translateX(3px);
            border-color: color-mix(in srgb, var(--banner-accent) 60%, white 8%);
            box-shadow: 0 10px 28px rgba(0,0,0,0.46);
        }
        .mp-banner__image {
            position: absolute;
            inset: -10px -18px;
            width: calc(100% + 36px);
            height: calc(100% + 20px);
            object-fit: cover;
            object-position: center;
            opacity: 0.5;
            filter: contrast(1.05) saturate(0.95);
            z-index: -3;
        }
        .mp-banner__veil {
            position: absolute;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(3,5,12,0.95) 0%, rgba(3,5,12,0.72) 42%, rgba(3,5,12,0.4) 78%, rgba(3,5,12,0.74) 100%),
                radial-gradient(ellipse at 80% 40%, color-mix(in srgb, var(--banner-accent) 30%, transparent), transparent 60%);
        }
        .mp-banner__portrait {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid color-mix(in srgb, var(--banner-accent) 70%, white 8%);
            background: rgba(0,0,0,0.45);
            box-shadow: 0 0 16px color-mix(in srgb, var(--banner-accent) 40%, transparent);
        }
        .mp-banner__portrait img { width: 100%; height: 100%; object-fit: cover; }
        .mp-banner__body { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .mp-banner__role {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0;
            color: var(--banner-accent);
            line-height: 1;
        }
        .mp-banner__name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 16px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        /* ════════════════════════════════════════════════════════════════
           ABA PERSONAGENS — design system (Etapa C)
           Cards teatrais no estilo Metaphor: portrait grande, diagonal,
           alto contraste, tipografia display.
           ════════════════════════════════════════════════════════════════ */

        /* Divisor de seção dramático (Cast / NPC) */
        .mp-section-divider {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0 6px;
        }
        .mp-section-divider__label {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 5px 18px 5px 14px;
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
            background: var(--divider-bg, rgba(120,90,20,0.22));
            border: 1px solid var(--divider-color, rgba(201,152,58,0.35));
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.28em;
            color: var(--divider-color, var(--gold-mid));
            flex-shrink: 0;
        }
        .mp-section-divider__line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--divider-color, var(--border-gold)), transparent);
            opacity: 0.4;
        }
        .mp-section-divider__count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 900;
            color: var(--divider-color, var(--gold-mid));
            opacity: 0.55;
        }

        /* Card de personagem — vertical, portrait grande */
        .mp-character-banner {
            --char-accent: var(--gold-mid);
            position: relative;
            isolation: isolate;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(4,6,14,0.90);
            border: 1px solid rgba(255,255,255,0.09);
            box-shadow: 0 10px 34px rgba(0,0,0,0.54);
            clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 22px 100%, 0 calc(100% - 22px));
            transition: transform 0.22s cubic-bezier(0.22,1,0.36,1), border-color 0.22s ease, box-shadow 0.22s ease;
            cursor: default;
        }
        .mp-character-banner:hover {
            transform: translateY(-4px) scale(1.015);
            border-color: color-mix(in srgb, var(--char-accent) 62%, white 8%);
            box-shadow:
                0 20px 52px rgba(0,0,0,0.72),
                0 0 28px color-mix(in srgb, var(--char-accent) 26%, transparent);
        }

        /* Zona de retrato — aspect-ratio fixo */
        .mp-character-portrait {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            max-height: 210px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .mp-character-portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            transition: transform 0.4s ease, filter 0.28s ease;
        }
        .mp-character-banner:hover .mp-character-portrait img {
            transform: scale(1.06);
            filter: contrast(1.06) saturate(1.08);
        }
        .mp-character-portrait__veil {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                transparent 35%,
                rgba(4,6,14,0.72) 72%,
                rgba(4,6,14,0.96) 100%);
            pointer-events: none;
            z-index: 1;
        }
        .mp-character-portrait__glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 60% 20%,
                color-mix(in srgb, var(--char-accent) 24%, transparent),
                transparent 62%);
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.26s ease;
        }
        .mp-character-banner:hover .mp-character-portrait__glow { opacity: 1; }
        .mp-character-portrait__fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg,
                rgba(4,6,14,0.97),
                color-mix(in srgb, var(--char-accent) 16%, rgba(4,6,14,0.82)));
        }
        .mp-character-portrait__badge {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 3;
            padding: 3px 11px 3px 9px;
            clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
            background: rgba(3,5,12,0.75);
            border: 1px solid var(--char-accent);
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            color: var(--char-accent);
            backdrop-filter: blur(4px);
        }
        .mp-character-portrait__combat {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 3;
            padding: 4px 9px;
            clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
            background: rgba(220,38,38,0.85);
            border: 1px solid rgba(248,113,113,0.7);
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* Corpo abaixo do retrato */
        .mp-character-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 13px 12px;
            position: relative;
        }
        .mp-character-body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                color-mix(in srgb, var(--char-accent) 55%, transparent) 40%,
                transparent);
        }
        .mp-character-name {
            font-size: clamp(15px, 1.6vw, 20px);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.01em;
            line-height: 1.0;
            color: #fff;
            text-shadow:
                0 2px 10px rgba(0,0,0,0.9),
                0 0 20px color-mix(in srgb, var(--char-accent) 38%, transparent);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 2px;
        }
        .mp-character-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: color-mix(in srgb, var(--char-accent) 70%, rgba(255,255,255,0.5));
            margin-bottom: 9px;
        }

        /* Faixa de stats (HP / Aura / Ammo) */
        .mp-character-stat-strip {
            display: flex;
            align-items: stretch;
            gap: 0;
            margin-bottom: 9px;
            border: 1px solid rgba(255,255,255,0.07);
